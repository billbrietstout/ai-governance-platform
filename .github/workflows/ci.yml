name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Build
        run: npm run build
        env:
          # Dummy values for build-time env validation (not used at runtime)
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH0_CLIENT_ID: dummy
          AUTH0_CLIENT_SECRET: dummy
          AUTH0_ISSUER: https://dummy.example.com/
          AUTH_SECRET: dummy-secret-min-32-chars-for-build

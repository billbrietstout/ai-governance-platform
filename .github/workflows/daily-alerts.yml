name: Daily Alerts Email

on:
  schedule:
    # Every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, do not send emails)"
        required: false
        default: "false"
        type: boolean
      severity:
        description: "Minimum alert severity to include"
        required: false
        default: "medium"
        type: choice
        options:
          - low
          - medium
          - high
          - critical

jobs:
  send-daily-alerts:
    name: Send Daily Alerts
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Run daily alerts job
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL || 'https://ai-governance-platform-staging.up.railway.app' }}
          ALERT_SEVERITY: ${{ inputs.severity || 'medium' }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "X-Severity: $ALERT_SEVERITY" \
            -f "$APP_URL/api/v1/notifications/check-alerts"
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Alerts Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The daily alerts workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'notifications']
            })

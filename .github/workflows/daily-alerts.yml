name: Daily Alerts Email

on:
  schedule:
    # Every day at 7:00 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, do not send emails)'
        required: false
        default: 'false'
        type: boolean
      severity:
        description: 'Minimum alert severity to include'
        required: false
        default: 'medium'
        type: choice
        options:
          - low
          - medium
          - high
          - critical

jobs:
  send-daily-alerts:
    name: Send Daily Alerts
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily alerts job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APP_URL: ${{ vars.APP_URL || 'https://ai-governance-platform-staging.up.railway.app' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          ALERT_SEVERITY: ${{ inputs.severity || 'medium' }}
          NODE_ENV: production
        run: node scripts/jobs/daily-alerts.js

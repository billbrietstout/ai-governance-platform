name: Weekly Digest Email

on:
  schedule:
    # Every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, do not send emails)'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-weekly-digest:
    name: Send Weekly Digest
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weekly digest job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APP_URL: ${{ vars.APP_URL || 'https://ai-governance-platform-staging.up.railway.app' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          NODE_ENV: production
        run: node scripts/jobs/weekly-digest.js

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Digest Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly digest workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'notifications']
            })

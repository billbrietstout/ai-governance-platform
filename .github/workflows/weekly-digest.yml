name: Weekly Digest

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  send-digest:
    name: Send weekly digest
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly digest
        run: |
          curl -f -X POST \
            "${{ secrets.STAGING_URL }}/api/v1/notifications/send-digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
          echo "Weekly digest triggered"
